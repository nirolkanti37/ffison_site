<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - My Shop</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">
                    <span id="site-name">My Shop</span>
                </a>
            </div>
        </div>
    </header>

    <section class="success-page">
        <div class="container">
            <div class="success-box">
                <div class="success-icon">✅</div>
                <h1>Order Placed Successfully!</h1>
                <p>Thank you for your order. We will contact you soon.</p>
                <p>Order ID: <strong id="order-id">-</strong></p>
                <a href="index.html" class="btn btn-primary">Continue Shopping</a>
            </div>
        </div>
    </section>

    <script>
        // Get order ID from URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('order-id').textContent = params.get('order') || 'ORD-' + Date.now();
        // Clear cart
        localStorage.removeItem('cart');
    </script>
</body>
</html>
