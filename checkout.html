<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - My Shop</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="logo">
                    <img src="assets/logo.png" alt="Logo" id="site-logo">
                    <span id="site-name">My Shop</span>
                </a>
                <nav class="nav">
                    <a href="index.html">Home</a>
                    <a href="products.html">Products</a>
                </nav>
            </div>
        </div>
    </header>

    <section class="checkout">
        <div class="container">
            <h1>Checkout</h1>
            <div class="checkout-grid">
                <div class="checkout-form">
                    <h3>Shipping Information</h3>
                    <form id="checkout-form" onsubmit="return placeOrder(event)">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="customer-name" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="customer-email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone *</label>
                            <input type="tel" id="customer-phone" required>
                        </div>
                        <div class="form-group">
                            <label>Address *</label>
                            <textarea id="customer-address" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="customer-city">
                        </div>
                        <div class="form-group">
                            <label>ZIP Code</label>
                            <input type="text" id="customer-zip">
                        </div>
                        <div class="form-group">
                            <label>Country</label>
                            <input type="text" id="customer-country" value="Bangladesh">
                        </div>
                        <div class="form-group">
                            <label>Coupon Code</label>
                            <div class="coupon-input">
                                <input type="text" id="coupon-code" placeholder="Enter code">
                                <button type="button" onclick="applyCoupon()">Apply</button>
                            </div>
                            <span id="coupon-message"></span>
                        </div>
                        <div class="form-group">
                            <label>Payment Method</label>
                            <select id="payment-method">
                                <option value="cod">Cash on Delivery</option>
                                <option value="bank">Bank Transfer</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-large">Place Order</button>
                    </form>
                </div>
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-items" id="summary-items"></div>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="summary-subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Discount</span>
                        <span id="summary-discount">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span id="summary-shipping">$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="summary-total">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p id="copyright-name">My Shop</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
    <script>
        loadConfig();
        loadCheckoutSummary();
    </script>
</body>
</html>
