<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase - Online Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo">
                <i class="fas fa-shopping-bag"></i>
                ShopEase
            </a>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="প্রোডাক্ট সার্চ করুন...">
            </div>
            <div class="header-actions">
                <button class="cart-btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span>কার্ট</span>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <h1>🛍️ সেরা পণ্য, সেরা দামে!</h1>
        <p>আমাদের কালেকশন থেকে আপনার পছন্দের প্রোডাক্ট বেছে নিন। প্রতিটি প্রোডাক্টে বিশেষ ছাড়!</p>
    </section>

    <!-- Main Content -->
    <main class="container">
        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label><i class="fas fa-filter"></i> ক্যাটাগরি:</label>
                <select id="categoryFilter" onchange="applyFilters()">
                    <option value="all">সব ক্যাটাগরি</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-sort"></i> সাজান:</label>
                <select id="sortFilter" onchange="applyFilters()">
                    <option value="default">ডিফল্ট</option>
                    <option value="price-low">দাম: কম থেকে বেশি</option>
                    <option value="price-high">দাম: বেশি থেকে কম</option>
                    <option value="rating">রেটিং</option>
                    <option value="name">নাম</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-tag"></i> দামের রেঞ্জ:</label>
                <div class="price-range">
                    <input type="number" id="minPrice" placeholder="কম" onchange="applyFilters()">
                    <span>-</span>
                    <input type="number" id="maxPrice" placeholder="বেশি" onchange="applyFilters()">
                </div>
            </div>
        </div>

        <!-- Products Grid -->
        <div id="productsContainer">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>প্রোডাক্ট লোড হচ্ছে...</p>
            </div>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-cart"></i> আপনার কার্ট</h2>
            <button class="close-cart" onclick="toggleCart()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty">
                <i class="fas fa-shopping-basket"></i>
                <p>কার্ট খালি</p>
            </div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>মোট:</span>
                <span id="cartTotal">৳0</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">
                <i class="fas fa-credit-card"></i> অর্ডার করুন
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">প্রোডাক্ট কার্টে যোগ হয়েছে!</span>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <h3>ShopEase</h3>
        <p>আপনার বিশ্বস্ত অনলাইন শপিং পার্টনার</p>
        <div class="footer-links">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <p style="margin-top: 1.5rem; font-size: 0.85rem;">© 2026 ShopEase. সর্বস্বত্ব সংরক্ষিত।</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
